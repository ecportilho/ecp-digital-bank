name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:

  # ─────────────────────────────────────────────────
  # JOB 1 — Qualidade de código
  # ─────────────────────────────────────────────────
  code-quality:
    name: Code Quality (lint + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: TypeScript — typecheck server
        run: cd server && npx tsc --noEmit
      - name: TypeScript — typecheck web
        run: cd web && npx tsc --noEmit

  # ─────────────────────────────────────────────────
  # JOB 2 — Testes unitários + cobertura
  # ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run server tests (Vitest)
        run: cd server && npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          DATABASE_PATH: ":memory:"

      - name: Run web tests (Vitest)
        run: cd web && npx vitest run --reporter=verbose

  # ─────────────────────────────────────────────────
  # JOB 3 — Build (verifica que compila para produção)
  # ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install web dependencies
        run: cd web && npm ci
      - name: Build web (Vite)
        run: cd web && npx vite build
        env:
          VITE_API_URL: https://api.ecpbank.com.br

  # ─────────────────────────────────────────────────
  # JOB 4 — Change Management Gate (GMUD)
  # ─────────────────────────────────────────────────
  change-gate:
    name: Change Management Gate
    runs-on: ubuntu-latest
    needs: [code-quality]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Verify GMUD approval
        run: |
          GMUD_FILE=$(find docs/gmud -name "GMUD-*.md" 2>/dev/null | \
            xargs grep -l "Status.*Aprovada" 2>/dev/null | \
            sort -r | head -1)

          if [ -z "$GMUD_FILE" ]; then
            echo "❌ BLOQUEADO: Nenhuma GMUD aprovada encontrada em docs/gmud/"
            echo "Criar GMUD via Change Manager antes de fazer deploy em produção"
            exit 1
          fi
          echo "✅ GMUD aprovada: $GMUD_FILE"

  # ─────────────────────────────────────────────────
  # JOB 5 — Deploy em Produção (apenas na main)
  # ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build, change-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci && cd ../web && npm ci

      - name: Build web
        run: cd web && npx vite build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy server
        run: |
          echo "📦 Deploying Fastify API server..."
          echo "Strategy: Copy server/ + node_modules to production host"
          echo "Run: cd server && node --import tsx src/server.ts"
          # Substituir por script real de deploy (rsync, scp, ou plataforma como Railway/Render)
          # Exemplo Railway:
          # railway up --service api
          echo "✅ Server deploy placeholder — configurar com plataforma real"

      - name: Deploy web (static)
        run: |
          echo "📦 Deploying Vite static build..."
          echo "Output: web/dist/"
          # Substituir por deploy real (Vercel, Netlify, Cloudflare Pages, S3+CloudFront)
          # Exemplo Vercel:
          # npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Web deploy placeholder — configurar com plataforma real"

      - name: Run database migrations
        run: |
          echo "🗄️ Running SQLite migrations..."
          # Em produção com SQLite, o arquivo database.sqlite fica no servidor
          # cd server && npx tsx src/database/migrations/run.ts
          echo "✅ Migration placeholder — executar no servidor de produção"

      - name: Smoke test
        run: |
          echo "🔍 Running smoke tests..."
          # curl -f ${{ secrets.API_URL }}/health || exit 1
          echo "✅ Smoke test placeholder — configurar URL de produção"

  # ─────────────────────────────────────────────────
  # JOB 6 — Quality Gate final
  # ─────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ||
                "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          echo "✅ All quality checks passed"
